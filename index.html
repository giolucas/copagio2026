<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copa do Mundo 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter','Helvetica Neue',Arial,sans-serif;
    background: #111118;
    color: #f1f1f3;
    min-height: 100vh;
    padding: 28px 16px 60px;
  }
  .page { max-width: 680px; margin: 0 auto; }
  .eyebrow { font-size: 10px; letter-spacing: .12em; color: #5EE6C8; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
  h1 { font-size: 30px; font-weight: 800; margin: 0 0 4px; letter-spacing: -.02em; }
  .subtitle { font-size: 12px; color: #55556a; margin-bottom: 20px; }

  .latest {
    background: linear-gradient(135deg,#143A5E,#0F2647);
    border: 1px solid #5EE6C8;
    border-radius: 18px;
    padding: 14px 16px 18px;
    margin-bottom: 20px;
  }
  .latest-label { font-size: 10px; color: #5EE6C8; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  .card-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .team-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .flag { font-size: 34px; line-height: 1; }
  .flag-lg { font-size: 42px; line-height: 1; }
  .team-name { font-size: 11px; font-weight: 600; color: #b0b0c8; text-align: center; line-height: 1.3; }
  .team-name-lg { font-size: 13px; font-weight: 700; color: #e0e0f0; text-align: center; margin-top: 4px; }
  .score { font-size: 22px; font-weight: 900; color: #fff; padding: 4px 14px; background: #0B1F3A; border-radius: 8px; }
  .score-lg { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: -.02em; padding: 4px 16px; background: #0B1F3A; border-radius: 10px; }

  .section { margin-bottom: 28px; }
  .section-title { font-size: 11px; font-weight: 700; color: #7c7c99; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }

  .match-list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: #1c1c28; border: 1px solid #2a2a3a; border-radius: 16px; padding: 12px 14px 16px;
  }
  .card-meta { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .card-group { font-size: 10px; color: #55556a; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .card-date { font-size: 11px; color: #5EE6C8; font-weight: 600; }

  .search {
    width: 100%; box-sizing: border-box; padding: 11px 14px; border-radius: 10px;
    border: 1px solid #2a2a3a; background: #1c1c28; color: #f1f1f3; font-size: 14px; outline: none;
    margin-bottom: 20px;
  }

  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tab {
    padding: 7px 13px; border-radius: 999px; border: 1px solid #2a2a3a;
    background: transparent; color: #7c7c99; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .tab.active { background: #5EE6C8; color: #111118; border-color: #5EE6C8; }

  .table-wrap { overflow-x: auto; border: 1px solid #2a2a3a; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 8px; color: #55556a; font-weight: 600; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #2a2a3a; text-align: center; }
  th.left { text-align: left; padding-left: 12px; }
  th.bold { color: #5EE6C8; font-weight: 700; }
  td { text-align: center; padding: 10px 8px; border-bottom: 1px solid #1a1a2a; color: #9090a8; }
  td.left { text-align: left; padding-left: 12px; font-weight: 600; color: #f1f1f3; }
  td.bold { font-weight: 800; color: #5EE6C8; }
  tr.qualified { background: rgba(94,230,200,0.05); }

  footer { margin-top: 32px; font-size: 11px; color: #44445a; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="page" id="root"></div>

<script>
var FLAG = {
  "México": "🇲🇽", "África do Sul": "🇿🇦", "Coreia do Sul": "🇰🇷", "Tchéquia": "🇨🇿",
  "Suíça": "🇨🇭", "Catar": "🇶🇦", "Brasil": "🇧🇷", "Marrocos": "🇲🇦",
  "Escócia": "🇬🇧", "Haiti": "🇭🇹", "Estados Unidos": "🇺🇸", "Paraguai": "🇵🇾",
  "Alemanha": "🇩🇪", "Curaçao": "🇨🇼", "Costa do Marfim": "🇨🇮", "Equador": "🇪🇨",
  "Holanda": "🇳🇱", "Japão": "🇯🇵", "Espanha": "🇪🇸", "Cabo Verde": "🇨🇻",
  "Uruguai": "🇺🇾", "Arábia Saudita": "🇸🇦", "Bélgica": "🇧🇪", "Egito": "🇪🇬",
  "Suécia": "🇸🇪", "Tunísia": "🇹🇳", "Irã": "🇮🇷", "Nova Zelândia": "🇳🇿",
  "Austrália": "🇦🇺", "Turquia": "🇹🇷", "Canadá": "🇨🇦", "Bósnia e Herzegovina": "🇧🇦"
};

var matches = [
  { group: "A", home: "México", away: "África do Sul", hs: 2, as: 0, date: "11/06" },
  { group: "A", home: "Coreia do Sul", away: "Tchéquia", hs: 2, as: 1, date: "15/06" },
  { group: "B", home: "Suíça", away: "Catar", hs: 1, as: 1, date: "13/06" },
  { group: "C", home: "Brasil", away: "Marrocos", hs: 1, as: 1, date: "13/06" },
  { group: "C", home: "Escócia", away: "Haiti", hs: 1, as: 0, date: "13/06" },
  { group: "D", home: "Estados Unidos", away: "Paraguai", hs: 4, as: 1, date: "12/06" },
  { group: "E", home: "Alemanha", away: "Curaçao", hs: 7, as: 1, date: "14/06" },
  { group: "E", home: "Costa do Marfim", away: "Equador", hs: 1, as: 0, date: "14/06" },
  { group: "F", home: "Holanda", away: "Japão", hs: 2, as: 2, date: "14/06" },
  { group: "G", home: "Espanha", away: "Cabo Verde", hs: 0, as: 0, date: "13/06" },
  { group: "G", home: "Uruguai", away: "Arábia Saudita", hs: 1, as: 1, date: "13/06" },
  { group: "H", home: "Bélgica", away: "Egito", hs: 1, as: 1, date: "13/06" },
  { group: "I", home: "Suécia", away: "Tunísia", hs: 5, as: 1, date: "13/06" },
  { group: "J", home: "Irã", away: "Nova Zelândia", hs: 2, as: 2, date: "13/06" },
  { group: "K", home: "Austrália", away: "Turquia", hs: 2, as: 0, date: "13/06" },
  { group: "L", home: "Canadá", away: "Bósnia e Herzegovina", hs: 1, as: 1, date: "12/06" }
];

function parseDate(d) {
  var parts = d.split("/").map(Number);
  return parts[1] * 100 + parts[0];
}
function sortByDateDesc(list) {
  return list.slice().sort(function(a, b) { return parseDate(b.date) - parseDate(a.date); });
}
function computeStandings(group) {
  var teams = {};
  function add(name) {
    if (!teams[name]) teams[name] = { name: name, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, pts: 0 };
  }
  matches.filter(function(m) { return m.group === group; }).forEach(function(m) {
    add(m.home); add(m.away);
    var h = teams[m.home], a = teams[m.away];
    h.j++; a.j++;
    h.gp += m.hs; h.gc += m.as;
    a.gp += m.as; a.gc += m.hs;
    if (m.hs > m.as) { h.v++; h.pts += 3; a.d++; }
    else if (m.hs < m.as) { a.v++; a.pts += 3; h.d++; }
    else { h.e++; a.e++; h.pts++; a.pts++; }
  });
  return Object.keys(teams).map(function(k){ return teams[k]; }).sort(function(x, y) {
    return y.pts - x.pts || (y.gp - y.gc) - (x.gp - x.gc) || y.gp - x.gp;
  });
}

var playedGroups = Array.from(new Set(matches.map(function(m){ return m.group; }))).sort();
var state = { activeGroup: playedGroups[0], query: "" };

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.indexOf("on") === 0) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  (children || []).forEach(function(c) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function matchCard(m) {
  return el("div", { class: "card" }, [
    el("div", { class: "card-meta" }, [
      el("span", { class: "card-group" }, ["Grupo " + m.group]),
      el("span", { class: "card-date" }, ["⚽ " + m.date])
    ]),
    el("div", { class: "card-body" }, [
      el("div", { class: "team-col" }, [
        el("span", { class: "flag" }, [FLAG[m.home] || "🏳️"]),
        el("span", { class: "team-name" }, [m.home])
      ]),
      el("span", { class: "score" }, [m.hs + " – " + m.as]),
      el("div", { class: "team-col" }, [
        el("span", { class: "flag" }, [FLAG[m.away] || "🏳️"]),
        el("span", { class: "team-name" }, [m.away])
      ])
    ])
  ]);
}

function matchList(list) {
  var wrap = el("div", { class: "match-list" }, []);
  list.forEach(function(m) { wrap.appendChild(matchCard(m)); });
  return wrap;
}

function render() {
  var root = document.getElementById("root");
  root.innerHTML = "";

  // Header
  root.appendChild(el("div", { class: "eyebrow" }, ["FASE DE GRUPOS · RODADA 1 DE 3"]));
  root.appendChild(el("h1", {}, ["Copa do Mundo 2026"]));
  root.appendChild(el("p", { class: "subtitle" }, ["EUA · México · Canadá — 11 jun a 19 jul · atualizado em 18/06"]));

  // Latest match
  var mostRecent = sortByDateDesc(matches)[0];
  root.appendChild(el("div", { class: "latest" }, [
    el("div", { class: "latest-label" }, ["Jogo mais recente · " + mostRecent.date]),
    el("div", { class: "card-body" }, [
      el("div", { class: "team-col" }, [
        el("span", { class: "flag-lg" }, [FLAG[mostRecent.home] || "🏳️"]),
        el("span", { class: "team-name-lg" }, [mostRecent.home])
      ]),
      el("span", { class: "score-lg" }, [mostRecent.hs + " – " + mostRecent.as]),
      el("div", { class: "team-col" }, [
        el("span", { class: "flag-lg" }, [FLAG[mostRecent.away] || "🏳️"]),
        el("span", { class: "team-name-lg" }, [mostRecent.away])
      ])
    ])
  ]));

  // All matches
  var allSection = el("section", { class: "section" }, [
    el("h2", { class: "section-title" }, ["Todos os jogos"])
  ]);
  allSection.appendChild(matchList(sortByDateDesc(matches)));
  root.appendChild(allSection);

  // Search
  var searchInput = el("input", {
    class: "search",
    placeholder: "Buscar seleção…",
    value: state.query,
    oninput: function(e) { state.query = e.target.value; render(); }
  });
  root.appendChild(searchInput);
  searchInput.focus();
  searchInput.setSelectionRange(state.query.length, state.query.length);

  if (state.query.trim()) {
    var q = state.query.toLowerCase();
    var filtered = sortByDateDesc(matches.filter(function(m) {
      return m.home.toLowerCase().indexOf(q) >= 0 || m.away.toLowerCase().indexOf(q) >= 0;
    }));
    var resultSection = el("section", { class: "section" }, [
      el("h2", { class: "section-title" }, ['Resultados — "' + state.query + '"'])
    ]);
    resultSection.appendChild(matchList(filtered));
    root.appendChild(resultSection);
  } else {
    // Tabs
    var tabsNav = el("nav", { class: "tabs" }, []);
    playedGroups.forEach(function(g) {
      var btn = el("button", {
        class: "tab" + (state.activeGroup === g ? " active" : ""),
        onclick: function() { state.activeGroup = g; render(); }
      }, ["Grupo " + g]);
      tabsNav.appendChild(btn);
    });
    root.appendChild(tabsNav);

    // Standings
    var standings = computeStandings(state.activeGroup);
    var standingsSection = el("section", { class: "section" }, [
      el("h2", { class: "section-title" }, ["Classificação — Grupo " + state.activeGroup])
    ]);
    var tableWrap = el("div", { class: "table-wrap" }, []);
    var table = el("table", {}, []);
    var thead = el("thead", {}, []);
    var headRow = el("tr", {}, []);
    headRow.appendChild(el("th", { class: "left" }, ["Seleção"]));
    ["J","V","E","D","GP","GC","SG"].forEach(function(h) {
      headRow.appendChild(el("th", {}, [h]));
    });
    headRow.appendChild(el("th", { class: "bold" }, ["Pts"]));
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = el("tbody", {}, []);
    standings.forEach(function(t, i) {
      var row = el("tr", { class: i < 2 ? "qualified" : "" }, []);
      row.appendChild(el("td", { class: "left" }, [(FLAG[t.name] || "") + " " + t.name]));
      row.appendChild(el("td", {}, [String(t.j)]));
      row.appendChild(el("td", {}, [String(t.v)]));
      row.appendChild(el("td", {}, [String(t.e)]));
      row.appendChild(el("td", {}, [String(t.d)]));
      row.appendChild(el("td", {}, [String(t.gp)]));
      row.appendChild(el("td", {}, [String(t.gc)]));
      row.appendChild(el("td", {}, [String(t.gp - t.gc)]));
      row.appendChild(el("td", { class: "bold" }, [String(t.pts)]));
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    standingsSection.appendChild(tableWrap);
    root.appendChild(standingsSection);

    // Group matches
    var groupMatches = sortByDateDesc(matches.filter(function(m) { return m.group === state.activeGroup; }));
    var groupSection = el("section", { class: "section" }, [
      el("h2", { class: "section-title" }, ["Jogos — Grupo " + state.activeGroup])
    ]);
    groupSection.appendChild(matchList(groupMatches));
    root.appendChild(groupSection);
  }

  // Footer
  root.appendChild(el("footer", {}, [
    "Jogos ordenados do mais recente ao mais antigo. Não atualiza sozinho — peça \"atualiza a copa\" para buscar os resultados mais recentes."
  ]));
}

render();
</script>
</body>
</html>
