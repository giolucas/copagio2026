<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa do Mundo 2026</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111118; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/plain" id="app-source">
    const { useState, useMemo } = React;

    const FLAG = {
      "México": "🇲🇽", "África do Sul": "🇿🇦", "Coreia do Sul": "🇰🇷", "Tchéquia": "🇨🇿",
      "Suíça": "🇨🇭", "Catar": "🇶🇦", "Brasil": "🇧🇷", "Marrocos": "🇲🇦",
      "Escócia": "🇬🇧", "Haiti": "🇭🇹", "Estados Unidos": "🇺🇸", "Paraguai": "🇵🇾",
      "Alemanha": "🇩🇪", "Curaçao": "🇨🇼", "Costa do Marfim": "🇨🇮", "Equador": "🇪🇨",
      "Holanda": "🇳🇱", "Japão": "🇯🇵", "Espanha": "🇪🇸", "Cabo Verde": "🇨🇻",
      "Uruguai": "🇺🇾", "Arábia Saudita": "🇸🇦", "Bélgica": "🇧🇪", "Egito": "🇪🇬",
      "Suécia": "🇸🇪", "Tunísia": "🇹🇳", "Irã": "🇮🇷", "Nova Zelândia": "🇳🇿",
      "Austrália": "🇦🇺", "Turquia": "🇹🇷", "Canadá": "🇨🇦", "Bósnia e Herzegovina": "🇧🇦",
    };

    const matches = [
      { group: "A", home: "México", away: "África do Sul", hs: 2, as: 0, date: "11/06" },
      { group: "A", home: "Coreia do Sul", away: "Tchéquia", hs: 2, as: 1, date: "15/06" },
      { group: "B", home: "Suíça", away: "Catar", hs: 1, as: 1, date: "13/06" },
      { group: "C", home: "Brasil", away: "Marrocos", hs: 1, as: 1, date: "13/06" },
      { group: "C", home: "Escócia", away: "Haiti", hs: 1, as: 0, date: "13/06" },
      { group: "D", home: "Estados Unidos", away: "Paraguai", hs: 4, as: 1, date: "12/06" },
      { group: "E", home: "Alemanha", away: "Curaçao", hs: 7, as: 1, date: "14/06" },
      { group: "E", home: "Costa do Marfim", away: "Equador", hs: 1, as: 0, date: "14/06" },
      { group: "F", home: "Holanda", away: "Japão", hs: 2, as: 2, date: "14/06" },
      { group: "G", home: "Espanha", away: "Cabo Verde", hs: 0, as: 0, date: "13/06" },
      { group: "G", home: "Uruguai", away: "Arábia Saudita", hs: 1, as: 1, date: "13/06" },
      { group: "H", home: "Bélgica", away: "Egito", hs: 1, as: 1, date: "13/06" },
      { group: "I", home: "Suécia", away: "Tunísia", hs: 5, as: 1, date: "13/06" },
      { group: "J", home: "Irã", away: "Nova Zelândia", hs: 2, as: 2, date: "13/06" },
      { group: "K", home: "Austrália", away: "Turquia", hs: 2, as: 0, date: "13/06" },
      { group: "L", home: "Canadá", away: "Bósnia e Herzegovina", hs: 1, as: 1, date: "12/06" },
    ];

    function parseDate(d) {
      const [day, month] = d.split("/").map(Number);
      return month * 100 + day;
    }
    function sortByDateDesc(list) {
      return [...list].sort((a, b) => parseDate(b.date) - parseDate(a.date));
    }

    function computeStandings(group) {
      const teams = {};
      const add = (name) => {
        if (!teams[name]) teams[name] = { name, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, pts: 0 };
      };
      matches.filter((m) => m.group === group).forEach((m) => {
        add(m.home); add(m.away);
        const h = teams[m.home], a = teams[m.away];
        h.j++; a.j++;
        h.gp += m.hs; h.gc += m.as;
        a.gp += m.as; a.gc += m.hs;
        if (m.hs > m.as) { h.v++; h.pts += 3; a.d++; }
        else if (m.hs < m.as) { a.v++; a.pts += 3; h.d++; }
        else { h.e++; a.e++; h.pts++; a.pts++; }
      });
      return Object.values(teams).sort(
        (x, y) => y.pts - x.pts || (y.gp - y.gc) - (x.gp - x.gc) || y.gp - x.gp
      );
    }

    const playedGroups = [...new Set(matches.map((m) => m.group))].sort();

    function MatchCard({ m }) {
      return (
        <div style={s.card}>
          <div style={s.cardMeta}>
            <span style={s.cardGroup}>Grupo {m.group}</span>
            <span style={s.cardDate}>⚽ {m.date}</span>
          </div>
          <div style={s.cardBody}>
            <div style={s.teamCol}>
              <span style={s.flag}>{FLAG[m.home] || "🏳️"}</span>
              <span style={s.teamName}>{m.home}</span>
            </div>
            <span style={s.score}>{m.hs} – {m.as}</span>
            <div style={s.teamCol}>
              <span style={s.flag}>{FLAG[m.away] || "🏳️"}</span>
              <span style={s.teamName}>{m.away}</span>
            </div>
          </div>
        </div>
      );
    }

    function MatchList({ matchesList }) {
      return (
        <div style={s.matchList}>
          {matchesList.map((m, i) => <MatchCard key={i} m={m} />)}
        </div>
      );
    }

    function Copa2026() {
      const [activeGroup, setActiveGroup] = useState(playedGroups[0]);
      const [query, setQuery] = useState("");

      const standings = useMemo(() => computeStandings(activeGroup), [activeGroup]);
      const groupMatches = useMemo(
        () => sortByDateDesc(matches.filter((m) => m.group === activeGroup)),
        [activeGroup]
      );
      const filteredMatches = useMemo(() => {
        if (!query.trim()) return sortByDateDesc(matches);
        const q = query.toLowerCase();
        return sortByDateDesc(matches.filter(
          (m) => m.home.toLowerCase().includes(q) || m.away.toLowerCase().includes(q)
        ));
      }, [query]);

      const mostRecent = sortByDateDesc(matches)[0];

      return (
        <div style={s.page}>
          <header style={s.header}>
            <div style={s.eyebrow}>FASE DE GRUPOS · RODADA 1 DE 3</div>
            <h1 style={s.title}>Copa do Mundo 2026</h1>
            <p style={s.subtitle}>EUA · México · Canadá — 11 jun a 19 jul · atualizado em 18/06</p>
          </header>

          <div style={s.latestWrap}>
            <div style={s.latestLabel}>Jogo mais recente · {mostRecent.date}</div>
            <div style={s.cardBody}>
              <div style={s.teamCol}>
                <span style={s.flagLg}>{FLAG[mostRecent.home] || "🏳️"}</span>
                <span style={s.teamNameLg}>{mostRecent.home}</span>
              </div>
              <span style={s.scoreLg}>{mostRecent.hs} – {mostRecent.as}</span>
              <div style={s.teamCol}>
                <span style={s.flagLg}>{FLAG[mostRecent.away] || "🏳️"}</span>
                <span style={s.teamNameLg}>{mostRecent.away}</span>
              </div>
            </div>
          </div>

          <section style={s.section}>
            <h2 style={s.sectionTitle}>Todos os jogos</h2>
            <MatchList matchesList={sortByDateDesc(matches)} />
          </section>

          <div style={s.searchRow}>
            <input
              style={s.search}
              placeholder="Buscar seleção…"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
            />
          </div>

          {query.trim() ? (
            <section style={s.section}>
              <h2 style={s.sectionTitle}>Resultados — "{query}"</h2>
              <MatchList matchesList={filteredMatches} />
            </section>
          ) : (
            <>
              <nav style={s.tabs}>
                {playedGroups.map((g) => (
                  <button
                    key={g}
                    onClick={() => setActiveGroup(g)}
                    style={{ ...s.tab, ...(activeGroup === g ? s.tabActive : {}) }}
                  >
                    Grupo {g}
                  </button>
                ))}
              </nav>

              <section style={s.section}>
                <h2 style={s.sectionTitle}>Classificação — Grupo {activeGroup}</h2>
                <div style={s.tableWrap}>
                  <table style={s.table}>
                    <thead>
                      <tr>
                        <th style={s.thLeft}>Seleção</th>
                        {["J","V","E","D","GP","GC","SG"].map(h => (
                          <th key={h} style={s.th}>{h}</th>
                        ))}
                        <th style={s.thBold}>Pts</th>
                      </tr>
                    </thead>
                    <tbody>
                      {standings.map((t, i) => (
                        <tr key={t.name} style={i < 2 ? s.rowQualified : {}}>
                          <td style={s.tdLeft}>{FLAG[t.name] || ""} {t.name}</td>
                          <td style={s.td}>{t.j}</td>
                          <td style={s.td}>{t.v}</td>
                          <td style={s.td}>{t.e}</td>
                          <td style={s.td}>{t.d}</td>
                          <td style={s.td}>{t.gp}</td>
                          <td style={s.td}>{t.gc}</td>
                          <td style={s.td}>{t.gp - t.gc}</td>
                          <td style={s.tdBold}>{t.pts}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </section>

              <section style={s.section}>
                <h2 style={s.sectionTitle}>Jogos — Grupo {activeGroup}</h2>
                <MatchList matchesList={groupMatches} />
              </section>
            </>
          )}

          <footer style={s.footer}>
            Jogos ordenados do mais recente ao mais antigo. Não atualiza sozinho —
            peça "atualiza a copa" para buscar os resultados mais recentes.
          </footer>
        </div>
      );
    }

    const s = {
      page: { fontFamily: "'Inter','Helvetica Neue',Arial,sans-serif", background: "#111118", color: "#f1f1f3", minHeight: "100vh", padding: "28px 16px 60px", maxWidth: 680, margin: "0 auto" },
      header: { marginBottom: 20 },
      eyebrow: { fontSize: 10, letterSpacing: "0.12em", color: "#5EE6C8", fontWeight: 700, marginBottom: 6, textTransform: "uppercase" },
      title: { fontSize: 30, fontWeight: 800, margin: "0 0 4px", letterSpacing: "-0.02em" },
      subtitle: { fontSize: 12, color: "#55556a", margin: 0 },
      latestWrap: { background: "linear-gradient(135deg,#143A5E,#0F2647)", border: "1px solid #5EE6C8", borderRadius: 18, padding: "14px 16px 18px", marginBottom: 20 },
      latestLabel: { fontSize: 10, color: "#5EE6C8", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 },
      flagLg: { fontSize: 42, lineHeight: 1 },
      teamNameLg: { fontSize: 13, fontWeight: 700, color: "#e0e0f0", textAlign: "center", marginTop: 4 },
      scoreLg: { fontSize: 30, fontWeight: 900, color: "#fff", letterSpacing: "-0.02em", padding: "4px 16px", background: "#0B1F3A", borderRadius: 10 },
      matchList: { display: "flex", flexDirection: "column", gap: 10 },
      card: { background: "#1c1c28", border: "1px solid #2a2a3a", borderRadius: 16, padding: "12px 14px 16px" },
      cardMeta: { display: "flex", justifyContent: "space-between", marginBottom: 12 },
      cardGroup: { fontSize: 10, color: "#55556a", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" },
      cardDate: { fontSize: 11, color: "#5EE6C8", fontWeight: 600 },
      cardBody: { display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8 },
      teamCol: { display: "flex", flexDirection: "column", alignItems: "center", gap: 5 },
      flag: { fontSize: 34, lineHeight: 1 },
      teamName: { fontSize: 11, fontWeight: 600, color: "#b0b0c8", textAlign: "center", lineHeight: 1.3 },
      score: { fontSize: 22, fontWeight: 900, color: "#fff", padding: "4px 14px", background: "#0B1F3A", borderRadius: 8 },
      searchRow: { marginBottom: 20 },
      search: { width: "100%", boxSizing: "border-box", padding: "11px 14px", borderRadius: 10, border: "1px solid #2a2a3a", background: "#1c1c28", color: "#f1f1f3", fontSize: 14, outline: "none" },
      tabs: { display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 },
      tab: { padding: "7px 13px", borderRadius: 999, border: "1px solid #2a2a3a", background: "transparent", color: "#7c7c99", fontSize: 13, fontWeight: 600, cursor: "pointer" },
      tabActive: { background: "#5EE6C8", color: "#111118", borderColor: "#5EE6C8" },
      section: { marginBottom: 28 },
      sectionTitle: { fontSize: 11, fontWeight: 700, color: "#7c7c99", marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.08em" },
      tableWrap: { overflowX: "auto", border: "1px solid #2a2a3a", borderRadius: 12 },
      table: { width: "100%", borderCollapse: "collapse", fontSize: 13 },
      thLeft: { textAlign: "left", padding: "10px 12px", color: "#55556a", fontWeight: 600, fontSize: 10, textTransform: "uppercase", borderBottom: "1px solid #2a2a3a" },
      th: { textAlign: "center", padding: "10px 8px", color: "#55556a", fontWeight: 600, fontSize: 10, textTransform: "uppercase", borderBottom: "1px solid #2a2a3a" },
      thBold: { textAlign: "center", padding: "10px 8px", color: "#5EE6C8", fontWeight: 700, fontSize: 10, textTransform: "uppercase", borderBottom: "1px solid #2a2a3a" },
      tdLeft: { textAlign: "left", padding: "10px 12px", borderBottom: "1px solid #1a1a2a", fontWeight: 600 },
      td: { textAlign: "center", padding: "10px 8px", borderBottom: "1px solid #1a1a2a", color: "#9090a8" },
      tdBold: { textAlign: "center", padding: "10px 8px", borderBottom: "1px solid #1a1a2a", fontWeight: 800, color: "#5EE6C8" },
      rowQualified: { background: "rgba(94,230,200,0.05)" },
      footer: { marginTop: 32, fontSize: 11, color: "#44445a", textAlign: "center", lineHeight: 1.6 },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<Copa2026 />);
  </script>
  <script>
    var src = document.getElementById('app-source').textContent;
    var output = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    var script = document.createElement('script');
    script.text = output;
    document.body.appendChild(script);
  </script>
</body>
</html>
